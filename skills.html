    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script>
      // Typewriter Animation
      const phrases = [
        "My Technical Skills",
        "My Professional Skills",

        "My Expertise",
      ];
      const typewriter = document.getElementById("typewriter");
      let phraseIndex = 0;
      let charIndex = 1; // Start after "My"
      let isDeleting = false;
      const typingSpeed = 100; // ms per character
      const deletingSpeed = 50; // ms per character
      const pauseTime = 1000; // Pause at full phrase
      const startPause = 500; // Pause before next phrase

      function type() {
        const currentPhrase = phrases[phraseIndex];
        const displayText = currentPhrase.substring(2, charIndex);
        typewriter.textContent = displayText;

        if (!isDeleting && charIndex < currentPhrase.length) {
          charIndex++;
          setTimeout(type, typingSpeed);
        } else if (isDeleting && charIndex > 2) {
          charIndex--;
          setTimeout(type, deletingSpeed);
        } else if (!isDeleting && charIndex === currentPhrase.length) {
          isDeleting = true;
          setTimeout(type, pauseTime);
        } else if (isDeleting && charIndex === 2) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          setTimeout(type, startPause);
        }
      }
      setTimeout(type, 1000);

      // Progress Bar and Circle Animations
      window.onload = function animateSkills() {
        const progressBars = document.querySelectorAll(".progress-bar");
        const progressCircles = document.querySelectorAll(".progress-circle");

        progressBars.forEach((bar) => {
          const targetWidth = parseInt(bar.style.width, 10) || 0;
          let width = 0;
          const duration = 1500;
          const startTime = performance.now();

          function animate(time) {
            const progress = Math.min((time - startTime) / duration, 1);
            width = progress * targetWidth;
            bar.style.width = `${width}%`;
            if (progress < 1) {
              requestAnimationFrame(animate);
            } else {
              bar.classList.remove("empty");
            }
          }
          requestAnimationFrame(animate);
        });

        progressCircles.forEach((circle) => {
          const parentDiv = circle.closest(".flex");
          const percentageSpan = parentDiv.querySelector(".progress-text");
          const percentage = parseInt(percentageSpan.textContent, 10) || 0;
          const targetOffset = 251.2 * (1 - percentage / 100);
          let offset = 251.2;
          const duration = 1500;
          const startTime = performance.now();

          function animate(time) {
            const progress = Math.min((time - startTime) / duration, 1);
            offset = 251.2 - progress * (251.2 - targetOffset);
            circle.style.strokeDashoffset = offset;
            if (progress < 1) {
              requestAnimationFrame(animate);
            } else {
              circle.classList.remove("empty");
            }
          }
          requestAnimationFrame(animate);
        });
      };

      // Fade-in Animation for Skill Cards
      document.addEventListener("DOMContentLoaded", function () {
        const fadeElements = document.querySelectorAll(".fade-in");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.2 }
        );
        fadeElements.forEach((el) => observer.observe(el));
      });
    </script>
