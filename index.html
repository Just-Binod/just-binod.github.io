<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binod - Home</title>

    <!-- Tailwind CSS & Flowbite -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <!-- GSAP for Cursor Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Spline Viewer for Cursor and Background -->
    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.0.47/build/spline-viewer.js"
    ></script>

    <!-- Standard Favicon -->
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicons/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="favicons/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="favicons/android-chrome-512x512.png"
    />

    <!-- Custom Animation Styles -->
    <style>
      .fade-in {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 2s ease-out forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .typewriter {
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid #9333ea;
        animation: blink 0.7s step-end infinite;
      }

      @keyframes blink {
        0%,
        50% {
          border-color: #9333ea;
        }
        51%,
        100% {
          border-color: transparent;
        }
      }

      /* Spline Cursor Styles */
      .spline-cursor {
        position: fixed;
        width: 80px;
        height: 80px;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        opacity: 1; /* Ensure visibility */
      }

      .spline-cursor.hovered {
        transform: translate(-50%, -50%) scale(1.3);
      }

      /* Fallback 2D Cursor */
      .fallback-cursor {
        position: fixed;
        width: 20px;
        height: 20px;
        background: radial-gradient(
          circle,
          rgba(147, 51, 234, 0.8) 20%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        opacity: 1;
        display: none; /* Hidden unless Spline fails */
      }

      .fallback-cursor.hovered {
        width: 40px;
        height: 40px;
        background: radial-gradient(
          circle,
          rgba(147, 51, 234, 1) 20%,
          transparent 70%
        );
        border: 2px solid #9333ea;
      }

      /* Hide default cursor on desktop */
      @media (hover: hover) and (pointer: fine) {
        body {
          cursor: none;
        }
      }

      /* Ensure Spline background is behind cursor */
      .spline-background {
        z-index: 0;
      }
    </style>
  </head>

  <body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-white">
    <!-- Custom Spline Cursor -->
    <div class="spline-cursor" id="spline-cursor">
      <spline-viewer
        url="https://prod.spline.design/8j6y9p8x8k9P0z3Q/scene.splinecode"
        style="width: 100%; height: 100%"
      ></spline-viewer>
    </div>
    <!-- Fallback 2D Cursor -->
    <div class="fallback-cursor" id="fallback-cursor"></div>

    <!-- Navigation -->
    <nav class="bg-white border-gray-200 dark:bg-gray-900 shadow-md">
      <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
      >
        <a
          href="index.html"
          class="flex items-center space-x-3 rtl:space-x-reverse"
        >
          <img
            src="images/binod.jpg"
            class="h-10 rounded-full"
            alt="Binod Logo"
            onerror="this.src='https://via.placeholder.com/40?text=Binod';"
          />
          <span
            class="self-center text-2xl font-semibold whitespace-nowrap text-purple-600 dark:text-purple-400"
          >
            <pre>&lt; Binod/&gt;</pre>
          </span>
        </a>
        <button
          data-collapse-toggle="navbar-default"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-purple-100 focus:outline-none focus:ring-2 focus:ring-purple-300 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
          aria-controls="navbar-default"
          aria-expanded="false"
        >
          <span class="sr-only">Open main menu</span>
          <svg
            class="w-5 h-5"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 17 14"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M1 1h15M1 7h15M1 13h15"
            />
          </svg>
        </button>
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
          <ul
            class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-white md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-white dark:bg-gray-800 md:dark:bg-gray-900 dark:border-gray-700"
          >
            <li>
              <a
                href="index.html"
                class="block py-2 px-3 text-white bg-purple-600 rounded-md md:bg-transparent md:text-purple-600 md:p-0 dark:text-purple-400 md:dark:text-purple-400"
                aria-current="page"
                >Home</a
              >
            </li>
            <li>
              <a
                href="about.html"
                class="block py-2 px-3 text-gray-900 rounded-md hover:bg-purple-100 md:hover:bg-transparent md:border-0 md:hover:text-purple-600 md:p-0 dark:text-white md:dark:hover:text-purple-400 dark:hover:bg-gray-700 dark:hover:text-white md:dark:hover:bg-transparent"
                >About</a
              >
            </li>
            <li>
              <a
                href="skills.html"
                class="block py-2 px-3 text-gray-900 rounded-md hover:bg-purple-100 md:hover:bg-transparent md:border-0 md:hover:text-purple-600 md:p-0 dark:text-white md:dark:hover:text-purple-400 dark:hover:bg-gray-700 dark:hover:text-white md:dark:hover:bg-transparent"
                >Skills</a
              >
            </li>
            <li>
              <a
                href="projects.html"
                class="block py-2 px-3 text-gray-900 rounded-md hover:bg-purple-100 md:hover:bg-transparent md:border-0 md:hover:text-purple-600 md:p-0 dark:text-white md:dark:hover:text-purple-400 dark:hover:bg-gray-700 dark:hover:text-white md:dark:hover:bg-transparent"
                >Projects</a
              >
            </li>
            <li>
              <a
                href="contact.html"
                class="block py-2 px-3 text-gray-900 rounded-md hover:bg-purple-100 md:hover:bg-transparent md:border-0 md:hover:text-purple-600 md:p-0 dark:text-white md:dark:hover:text-purple-400 dark:hover:bg-gray-700 dark:hover:text-white md:dark:hover:bg-transparent"
                >Contact</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen flex items-center justify-center">
      <!-- Background Spline -->
      <div class="absolute inset-0 spline-background">
        <spline-viewer
          url="https://prod.spline.design/0b3a4f4f-0f7a-4b3b-9c1b-4b3b9c1b4b3b/scene.splinecode"
          style="width: 100%; height: 100%"
        ></spline-viewer>
      </div>

      <!-- Foreground Text -->
      <div class="relative z-10 text-center">
        <h1
          class="text-5xl md:text-7xl font-bold text-purple-600 dark:text-purple-400 mb-4 fade-in"
          style="animation-delay: 0.5s"
        >
          <pre>&lt; Hello World !&gt;</pre>
        </h1>
        <p
          class="text-lg md:text-2xl text-gray-700 dark:text-gray-300 mb-6 fade-in"
          style="animation-delay: 0.8s"
        >
          <span
            id="typewriter"
            class="typewriter text-gray-700 dark:text-gray-400"
            >I am Binod Raj Pant</span
          >
        </p>
        <a
          href="projects.html"
          class="inline-block bg-purple-600 text-white py-3 px-6 rounded-md hover:bg-purple-700 transition duration-300 fade-in"
          style="animation-delay: 1.5s"
        >
          View My Work
        </a>
      </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script>
      // Typewriter Effect (Unchanged)
      const phrases = [
        "I am Binod Raj Pant !.",
        "I am Computer Engineering Student .",
        "I am AI, ML, Data Science Enthusiast .",
        "I am Vibe coder .",
      ];
      const typewriter = document.getElementById("typewriter");
      let phraseIndex = 0;
      let charIndex = 4; // Start after "I am "
      let isDeleting = false;
      const typingSpeed = 100; // ms per character
      const deletingSpeed = 50; // ms per character
      const pauseTime = 1000; // Pause at full phrase
      const startPause = 500; // Pause before starting next phrase

      function type() {
        const currentPhrase = phrases[phraseIndex];
        const displayText = currentPhrase.substring(0, charIndex);

        typewriter.textContent = displayText;

        if (!isDeleting && charIndex < currentPhrase.length) {
          charIndex++;
          setTimeout(type, typingSpeed);
        } else if (isDeleting && charIndex > 4) {
          charIndex--;
          setTimeout(type, deletingSpeed);
        } else if (!isDeleting && charIndex === currentPhrase.length) {
          isDeleting = true;
          setTimeout(type, pauseTime);
        } else if (isDeleting && charIndex === 4) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          setTimeout(type, startPause);
        }
      }

      setTimeout(type, 1000); // Initial delay before typing starts

      // Spline Cursor Animation
      document.addEventListener("DOMContentLoaded", () => {
        const splineCursor = document.getElementById("spline-cursor");
        const fallbackCursor = document.getElementById("fallback-cursor");

        // Check if GSAP and Spline are loaded
        if (
          typeof gsap !== "undefined" &&
          typeof SplineViewer !== "undefined"
        ) {
          // Follow mouse movement
          document.addEventListener("mousemove", (e) => {
            gsap.to(splineCursor, {
              x: e.clientX,
              y: e.clientY,
              duration: 0.2,
              ease: "power3.out",
            });
          });

          // Hover effects for interactive elements
          const hoverables = document.querySelectorAll("a, button");
          hoverables.forEach((el) => {
            el.addEventListener("mouseenter", () => {
              splineCursor.classList.add("hovered");
              gsap.to(splineCursor, {
                scale: 1.3,
                duration: 0.3,
                ease: "elastic.out(1, 0.3)",
              });
            });
            el.addEventListener("mouseleave", () => {
              splineCursor.classList.remove("hovered");
              gsap.to(splineCursor, {
                scale: 1,
                duration: 0.3,
                ease: "elastic.out(1, 0.3)",
              });
            });
          });

          // Hide cursor when mouse leaves the window
          document.addEventListener("mouseleave", () => {
            gsap.to(splineCursor, { opacity: 0, duration: 0.2 });
          });
          document.addEventListener("mouseenter", () => {
            gsap.to(splineCursor, { opacity: 1, duration: 0.2 });
          });

          // Check if Spline cursor loads successfully
          const splineViewer = splineCursor.querySelector("spline-viewer");
          splineViewer.addEventListener("load", () => {
            console.log("Spline cursor loaded successfully");
          });
          splineViewer.addEventListener("error", () => {
            console.error(
              "Spline cursor failed to load, switching to fallback"
            );
            splineCursor.style.display = "none";
            fallbackCursor.style.display = "block";
            animateFallbackCursor();
          });
        } else {
          console.warn("GSAP or Spline not loaded. Using fallback cursor.");
          splineCursor.style.display = "none";
          fallbackCursor.style.display = "block";
          animateFallbackCursor();
        }

        // Fallback cursor animation
        function animateFallbackCursor() {
          document.addEventListener("mousemove", (e) => {
            gsap.to(fallbackCursor, {
              x: e.clientX,
              y: e.clientY,
              duration: 0.2,
              ease: "power3.out",
            });
          });

          const hoverables = document.querySelectorAll("a, button");
          hoverables.forEach((el) => {
            el.addEventListener("mouseenter", () => {
              fallbackCursor.classList.add("hovered");
            });
            el.addEventListener("mouseleave", () => {
              fallbackCursor.classList.remove("hovered");
            });
          });

          document.addEventListener("mouseleave", () => {
            gsap.to(fallbackCursor, { opacity: 0, duration: 0.2 });
          });
          document.addEventListener("mouseenter", () => {
            gsap.to(fallbackCursor, { opacity: 1, duration: 0.2 });
          });
        }
      });
    </script>
  </body>
</html>
